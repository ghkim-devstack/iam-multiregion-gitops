apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - github.com/infinispan/infinispan-operator/config/default?ref=2.5.9

images:
  - name: operator
    newName: quay.io/infinispan/operator
    newTag: 2.5.9

patches:
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: infinispan-operator-controller-manager
      namespace: infinispan-operator-system
    patch: |-
      - op: remove
        path: /spec/template/spec/containers/0/env/0/valueFrom
      - op: add
        path: /spec/template/spec/containers/0/env/0/value
        value: ispn
